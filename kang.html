<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강감찬 학술대회 (가칭)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style> html { scroll-behavior: smooth; } body { font-family: 'Pretendard', sans-serif; } .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    
    <!-- 상단 네비게이션 바 -->
    <nav class="fixed w-full glass-nav shadow-sm z-50 border-b border-gray-100 transition-all">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center max-w-5xl">
            <!-- 메인 포털로 돌아가는 링크 연결 -->
            <a href="index.html" class="text-xl font-extrabold text-teal-900 tracking-tight flex items-center gap-2 hover:text-teal-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                학술대회 포털
            </a>
            <div class="hidden md:flex items-center space-x-6">
                <a href="#about" class="text-slate-600 hover:text-teal-600 font-medium">모시는 글</a>
                <a href="#schedule" class="text-slate-600 hover:text-teal-600 font-medium">프로그램</a>
                <a href="#register" class="text-slate-600 hover:text-teal-600 font-medium">사전등록</a>
            </div>
        </div>
    </nav>

    <!-- 메인 타이틀 (강감찬 학술대회는 진초록-청록색 톤으로 차별화) -->
    <section class="pt-40 pb-28 bg-gradient-to-br from-slate-900 via-teal-900 to-emerald-900 text-white text-center relative overflow-hidden">
        <div class="container mx-auto px-6 relative z-10">
            <span class="inline-block py-1 px-3 rounded-full bg-teal-500/30 text-teal-100 text-sm font-semibold mb-6 border border-teal-400/30">
                Special Conference
            </span>
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight drop-shadow-lg">강감찬 학술대회 (가칭)</h1>
            <p class="text-lg md:text-2xl mb-4 font-light text-teal-100 max-w-2xl mx-auto">주제 : 미정 (추후 업데이트 예정)</p>
            <p class="text-md md:text-lg mb-10 font-medium text-teal-200">일정 미정 | 장소 미정</p>
            <a href="#register" class="inline-block bg-white text-teal-900 px-8 py-4 rounded-full font-bold shadow-lg hover:bg-teal-50 hover:-translate-y-1 transition">
                사전등록 준비중
            </a>
        </div>
    </section>

    <!-- 모시는 글 (임시 텍스트) -->
    <section id="about" class="py-20 container mx-auto px-6 max-w-5xl">
        <div class="bg-white p-10 md:p-12 rounded-3xl shadow-sm border border-slate-100 relative">
            <h2 class="text-3xl font-bold mb-6 text-slate-800">모시는 글</h2>
            <p class="leading-relaxed text-slate-600 text-lg">
                본 행사는 현재 기획 단계에 있으며, 세부 일정이 확정되는 대로 공지될 예정입니다.<br><br>
                한국문화경제학회 회원 여러분의 많은 관심 부탁드립니다.
            </p>
        </div>
    </section>

    <!-- 사전등록 (준비중 안내) -->
    <section id="register" class="py-24 container mx-auto px-6 max-w-5xl text-center">
        <h2 class="text-3xl font-bold mb-4 text-slate-800">사전등록 및 접수</h2>
        <p class="mb-10 text-slate-500 text-lg">아직 접수 기간이 아닙니다. 일정이 확정되면 시스템이 오픈됩니다.</p>
        
        <div class="bg-slate-100 p-12 rounded-3xl border border-slate-200 max-w-4xl mx-auto text-slate-500 font-bold text-xl">
            ⏳ 시스템 준비중입니다.
        </div>
    </section>
    
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 text-center">
        <p class="text-sm">&copy; 2026 한국문화경제학회. All rights reserved.</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국문화경제학회 학술대회 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style> body { font-family: 'Pretendard', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    
    <!-- 상단 네비게이션 바 -->
    <nav class="w-full bg-white shadow-sm border-b border-gray-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center max-w-6xl">
            <a href="#" class="text-2xl font-extrabold text-indigo-900 tracking-tight">한국문화경제학회 학술대회</a>
            <a href="https://www.kace.kr/html/" target="_blank" class="bg-indigo-50 text-indigo-700 border border-indigo-100 px-4 py-2 rounded-full text-sm font-bold hover:bg-indigo-100 transition">
                학회 본부 홈페이지 ↗
            </a>
        </div>
    </nav>

    <!-- 메인 타이틀 -->
    <section class="pt-20 pb-12 bg-gradient-to-br from-slate-900 to-indigo-900 text-white text-center">
        <div class="container mx-auto px-6">
            <h1 class="text-3xl md:text-5xl font-extrabold mb-4">학술행사 통합 관리 시스템</h1>
            <p class="text-lg text-indigo-200">현재 접수 중이거나 예정된 학술대회 목록입니다.</p>
        </div>
    </section>

    <!-- 학술대회 목록 리스트 -->
    <section class="py-16 container mx-auto px-6 max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- 1. 추계 학술대회 카드 -->
            <div class="bg-white rounded-3xl p-8 shadow-lg shadow-indigo-100/50 border border-slate-100 hover:-translate-y-2 hover:shadow-xl transition-all duration-300">
                <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block">접수중</span>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">2026 추계 학술대회</h2>
                <p class="text-slate-500 mb-6">주제: 문화경제와 관광산업의 디지털 전환</p>
                
                <div class="space-y-2 mb-8 text-sm text-slate-600">
                    <p class="flex items-center gap-2">📅 2026년 11월 13일(금) - 14일(토)</p>
                    <p class="flex items-center gap-2">📍 안동 그랜드 호텔 및 하회마을</p>
                </div>
                
                <a href="fall.html" class="block w-full text-center bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">
                    페이지 바로가기 ➔
                </a>
            </div>

            <!-- 2. 강감찬 학술대회 카드 -->
            <div class="bg-white rounded-3xl p-8 shadow-lg shadow-indigo-100/50 border border-slate-100 hover:-translate-y-2 hover:shadow-xl transition-all duration-300">
                <span class="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block">준비중</span>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">강감찬 학술대회 (가칭)</h2>
                <p class="text-slate-500 mb-6">주제: 미정 (추후 업데이트 예정)</p>
                
                <div class="space-y-2 mb-8 text-sm text-slate-600">
                    <p class="flex items-center gap-2">📅 일정 미정</p>
                    <p class="flex items-center gap-2">📍 장소 미정 (관악구 일대 예정)</p>
                </div>
                
                <a href="kang.html" class="block w-full text-center bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition">
                    페이지 바로가기 ➔
                </a>
            </div>

        </div>
    </section>

</body>
</html>
